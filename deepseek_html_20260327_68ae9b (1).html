<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ConnectMe | Мессенджер с друзьями</title>
    <!-- Firebase SDK -->
    <script type="module">
        // Импорт Firebase (через CDN)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, arrayUnion, arrayRemove, query, where, onSnapshot, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ ЗАМЕНИТЕ НА ВАШ КОНФИГ ИЗ FIREBASE ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- DOM элементы ---
        const appDiv = document.getElementById('app');
        const authDiv = document.getElementById('authScreen');
        const currentUserNameSpan = document.getElementById('currentUserName');
        const friendsListDiv = document.getElementById('friendsList');
        const chatWithSpan = document.getElementById('chatWith');
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const addFriendBtn = document.getElementById('addFriendBtn');
        const friendSearchInput = document.getElementById('friendSearch');
        const friendSearchResults = document.getElementById('friendSearchResults');

        let currentUser = null;
        let activeFriendId = null;
        let unsubscribeMessages = null;

        // --- Вспомогательные функции ---
        function showApp() {
            authDiv.style.display = 'none';
            appDiv.style.display = 'flex';
        }

        function showAuth() {
            authDiv.style.display = 'flex';
            appDiv.style.display = 'none';
        }

        // Загрузка списка друзей текущего пользователя
        async function loadFriends() {
            if (!currentUser) return;
            const friendsRef = collection(db, 'users', currentUser.uid, 'friends');
            const snapshot = await getDocs(friendsRef);
            friendsListDiv.innerHTML = '';
            snapshot.forEach(doc => {
                const friendData = doc.data();
                const friendId = doc.id;
                const friendEl = document.createElement('div');
                friendEl.className = 'friend-item' + (activeFriendId === friendId ? ' active' : '');
                friendEl.innerHTML = `
                    <div class="friend-avatar">${friendData.displayName.charAt(0).toUpperCase()}</div>
                    <div class="friend-info">
                        <div class="friend-name">${escapeHtml(friendData.displayName)}</div>
                        <div class="friend-email">${escapeHtml(friendData.email)}</div>
                    </div>
                `;
                friendEl.addEventListener('click', () => selectFriend(friendId, friendData.displayName));
                friendsListDiv.appendChild(friendEl);
            });
            if (friendsListDiv.children.length === 0) {
                friendsListDiv.innerHTML = '<div class="empty">У вас пока нет друзей. Добавьте друга по email!</div>';
            }
        }

        // Выбор друга для чата
        function selectFriend(friendId, friendName) {
            if (unsubscribeMessages) unsubscribeMessages();
            activeFriendId = friendId;
            chatWithSpan.textContent = friendName;
            messageInput.disabled = false;
            sendBtn.disabled = false;
            // Подписка на сообщения
            const chatId = getChatId(currentUser.uid, friendId);
            const messagesRef = collection(db, 'messages', chatId, 'chats');
            const q = query(messagesRef, orderBy('timestamp', 'asc'));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isOwn = msg.senderId === currentUser.uid;
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${isOwn ? 'own' : 'other'}`;
                    msgDiv.innerHTML = `
                        <div class="bubble">
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString() : ''}</div>
                        </div>
                    `;
                    messagesContainer.appendChild(msgDiv);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
            // Перерисовываем список друзей для подсветки активного
            loadFriends();
        }

        // Уникальный идентификатор чата (упорядоченные uid)
        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        // Отправка сообщения
        async function sendMessage() {
            if (!activeFriendId || !currentUser) return;
            const text = messageInput.value.trim();
            if (!text) return;
            const chatId = getChatId(currentUser.uid, activeFriendId);
            const messagesRef = collection(db, 'messages', chatId, 'chats');
            await addDoc(messagesRef, {
                text: text,
                senderId: currentUser.uid,
                timestamp: serverTimestamp()
            });
            messageInput.value = '';
            messageInput.focus();
        }

        // Поиск пользователей по email для добавления в друзья
        async function searchUsers() {
            const email = friendSearchInput.value.trim().toLowerCase();
            if (!email) {
                friendSearchResults.innerHTML = '';
                return;
            }
            // Ищем в коллекции users по email (нужно создать индекс в Firestore)
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('email', '==', email));
            const snapshot = await getDocs(q);
            friendSearchResults.innerHTML = '';
            snapshot.forEach(docSnap => {
                const userData = docSnap.data();
                if (docSnap.id !== currentUser.uid) {
                    const resultEl = document.createElement('div');
                    resultEl.className = 'search-result';
                    resultEl.innerHTML = `
                        <span>${escapeHtml(userData.displayName)} (${escapeHtml(userData.email)})</span>
                        <button class="add-friend-btn" data-id="${docSnap.id}" data-name="${userData.displayName}">➕ Добавить</button>
                    `;
                    friendSearchResults.appendChild(resultEl);
                }
            });
            if (snapshot.empty) {
                friendSearchResults.innerHTML = '<div>Пользователь не найден</div>';
            }
            // Добавляем обработчики
            document.querySelectorAll('.add-friend-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const friendId = btn.dataset.id;
                    const friendName = btn.dataset.name;
                    const friendEmail = email;
                    // Добавляем друга в подколлекцию friends текущего пользователя
                    const friendRef = doc(db, 'users', currentUser.uid, 'friends', friendId);
                    await setDoc(friendRef, {
                        displayName: friendName,
                        email: friendEmail,
                        addedAt: serverTimestamp()
                    });
                    alert('Друг добавлен!');
                    friendSearchInput.value = '';
                    friendSearchResults.innerHTML = '';
                    loadFriends();
                });
            });
        }

        // --- Регистрация и вход ---
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authEmail = document.getElementById('authEmail');
        const authPassword = document.getElementById('authPassword');
        const authError = document.getElementById('authError');

        loginBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                authError.textContent = err.message;
            }
        });

        registerBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                // Создаём запись в коллекции users
                const userRef = doc(db, 'users', userCred.user.uid);
                await setDoc(userRef, {
                    email: email,
                    displayName: email.split('@')[0],
                    createdAt: serverTimestamp()
                });
            } catch (err) {
                authError.textContent = err.message;
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

        // Отслеживание состояния аутентификации
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Загружаем имя пользователя из Firestore
                const userRef = doc(db, 'users', user.uid);
                getDoc(userRef).then(docSnap => {
                    if (docSnap.exists()) {
                        currentUserNameSpan.textContent = docSnap.data().displayName;
                    } else {
                        currentUserNameSpan.textContent = user.email;
                    }
                });
                showApp();
                loadFriends();
                if (activeFriendId) selectFriend(activeFriendId, '');
            } else {
                currentUser = null;
                if (unsubscribeMessages) unsubscribeMessages();
                showAuth();
                authEmail.value = '';
                authPassword.value = '';
                authError.textContent = '';
                activeFriendId = null;
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        addFriendBtn.addEventListener('click', () => {
            friendSearchInput.style.display = 'block';
            friendSearchResults.style.display = 'block';
            addFriendBtn.style.display = 'none';
        });
        friendSearchInput.addEventListener('input', searchUsers);

        // Экспорт / импорт (локальный) не нужен, данные уже в облаке.
    </script>
    <style>
        /* Стили (адаптивные, как ранее) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b141a; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .app, .auth-screen { width: 100%; max-width: 1200px; height: 95vh; background: #f0f2f5; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e9edef; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-weight: 700; font-size: 1.3rem; color: #2e7d64; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: #eef2f5; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .friends-panel { width: 280px; background: #fff; border-right: 1px solid #e9edef; display: flex; flex-direction: column; overflow-y: auto; }
        .friends-header { padding: 16px; font-weight: 600; border-bottom: 1px solid #e9edef; }
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f2f5; }
        .friend-item:hover { background: #f5f6f8; }
        .friend-item.active { background: #e9f3ef; border-left: 4px solid #2e7d64; }
        .friend-avatar { width: 44px; height: 44px; background: #d9f0ec; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .friend-info { flex: 1; }
        .friend-name { font-weight: 600; }
        .friend-email { font-size: 12px; color: #7e8c8f; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e9edef; display: flex; justify-content: space-between; align-items: center; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; max-width: 75%; }
        .message.own { align-self: flex-end; justify-content: flex-end; }
        .message.other { align-self: flex-start; }
        .bubble { background: white; padding: 8px 14px; border-radius: 20px; box-shadow: 0 1px 1px rgba(0,0,0,0.05); }
        .message.own .bubble { background: #d9f0ec; border-bottom-right-radius: 4px; }
        .message.other .bubble { border-bottom-left-radius: 4px; }
        .message-text { font-size: 14px; }
        .message-time { font-size: 10px; color: #7e8c8f; text-align: right; margin-top: 4px; }
        .input-panel { background: #fff; padding: 12px 20px; display: flex; gap: 12px; border-top: 1px solid #e9edef; }
        .input-panel input { flex: 1; border: none; background: #f0f2f5; padding: 12px 18px; border-radius: 28px; outline: none; }
        .input-panel button { background: #2e7d64; border: none; color: white; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; }
        .auth-screen { display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
        .auth-card { background: white; padding: 32px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 12px 0; border-radius: 28px; border: 1px solid #ddd; }
        .auth-card button { background: #2e7d64; color: white; border: none; padding: 12px; width: 100%; border-radius: 28px; margin-top: 10px; cursor: pointer; }
        .auth-toggle { margin-top: 20px; color: #2e7d64; cursor: pointer; }
        .add-friend-area { padding: 12px; border-bottom: 1px solid #e9edef; }
        .add-friend-area input { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ddd; margin-bottom: 8px; }
        .search-result { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #f9f9f9; margin-bottom: 4px; border-radius: 20px; }
        .add-friend-btn { background: #2e7d64; color: white; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
        .empty { padding: 20px; text-align: center; color: #7e8c8f; }
        @media (max-width: 600px) { .friends-panel { width: 220px; } .message { max-width: 85%; } }
    </style>
</head>
<body>
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2>📱 ConnectMe</h2>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <button id="registerBtn">Зарегистрироваться</button>
            <div id="authError" style="color:red; margin-top:10px;"></div>
        </div>
    </div>

    <div id="app" class="app" style="display: none;">
        <div class="header">
            <div class="logo">📱 ConnectMe</div>
            <div class="user-info">
                <span id="currentUserName"></span>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
        </div>
        <div class="main">
            <div class="friends-panel">
                <div class="friends-header">Друзья</div>
                <div class="add-friend-area">
                    <button id="addFriendBtn" class="add-friend-btn" style="width:100%;">➕ Добавить друга</button>
                    <input type="email" id="friendSearch" placeholder="Email друга" style="display:none;">
                    <div id="friendSearchResults" style="display:none;"></div>
                </div>
                <div id="friendsList"></div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <span>Чат с <strong id="chatWith">...</strong></span>
                </div>
                <div id="messages" class="messages-area"></div>
                <div class="input-panel">
                    <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                    <button id="sendBtn" disabled>➤</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
